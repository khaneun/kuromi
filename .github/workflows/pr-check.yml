name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: pip install ruff

      - name: Ruff lint
        run: ruff check src config

      - name: Syntax check
        run: python -m compileall -q src config
